<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>莊子全解 — 作者折頁</title>
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 210mm;
      min-height: 297mm;
      background: #F7F5F0;
      color: #1C1C1C;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      font-family: "Noto Serif TC", "Source Han Serif TC", "Songti TC", serif;
    }
    
    .page {
      width: 210mm;
      height: 297mm;
      background: #fff;
      position: relative;
      padding: 18mm 16mm;
    }
    .flap {
      box-sizing: border-box;
      width: 105mm;
      max-width: 48%;
      margin: 8mm 0 8mm auto;
      padding: 16mm 12mm 18mm 14mm;
      border-left: 1px solid #D8C9A8;
      background: #FAF6EF;
      min-height: 240mm;
    }
    .label { margin: 0 0 1.6rem; font-size: 10pt; letter-spacing: 0.22em; color: #8A7350; font-family: system-ui, sans-serif; }
    .name { margin: 0 0 0.35rem; font-size: 26pt; letter-spacing: 0.2em; color: #2A2118; font-weight: 700; }
    .role { margin: 0 0 1.6rem; color: #7A6248; letter-spacing: 0.08em; font-size: 12pt; }
    .body { margin: 0 0 1.1rem; font-size: 12pt; line-height: 1.95; color: #2F281F; text-align: justify; }
    .body:last-child { margin-bottom: 0; }
    .hint { position: absolute; left: 16mm; bottom: 12mm; font-size: 9pt; color: #8A867C; font-family: system-ui, sans-serif; }
  
  </style>
</head>
<body>

  <div class="page">
    <section class="flap">
      <p class="label">書面折頁｜作者介紹</p>
      <p class="name">李孟霖</p>
      <p class="role">編集・《莊子全解》</p>
      <p class="body">出生於台灣。年少時不學無術，母親說以後長大應該是放牛吃草、撿牛屎賺錢。這幾年在人世中載浮載沉，見證過人性純粹的惡，也感受過美好。是個迷途的小書僮。</p>
<p class="body">未來打算寫一本結合 OECD 指引與各國判決的移轉訂價與預先訂價實務指南。（有時間的話）</p>
    </section>
    <p class="hint">作者折頁｜單獨下載頁</p>
  </div>
</body>
</html>
