<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>莊子全解 — 封面</title>
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 210mm;
      min-height: 297mm;
      background: #F7F5F0;
      color: #1C1C1C;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      font-family: "Noto Serif TC", "Source Han Serif TC", "Songti TC", serif;
    }
    
    .page { position: relative; width: 210mm; height: 297mm; overflow: hidden; background: #F7F5F0; }
    .geo-panel { position: absolute; top: 12%; right: 0; width: 34%; height: 62%; background: #6D7F6E; opacity: 0.88; }
    .geo-bar { position: absolute; left: 0; bottom: 18%; width: 58%; height: 7mm; background: #2F3430; }
    .geo-gold { position: absolute; top: 8%; right: 8%; width: 14mm; height: 14mm; background: #B8923A; }
    .geo-rule { position: absolute; top: 42%; left: 8%; width: 28mm; height: 1px; background: #D4BC7A; }
    .titles { position: relative; z-index: 2; max-width: 58%; padding: 28mm 14mm 24mm 18mm; text-align: left; }
    .title { margin: 0; font-family: "Kaiti TC", "STKaiti", "KaiTi", serif; font-size: 42pt; letter-spacing: 0.32em; font-weight: 500; color: #B8923A; line-height: 1.25; }
    .subtitle { margin: 1.1rem 0 0; font-size: 12pt; letter-spacing: 0.14em; color: #4A4A46; }
    .english { margin: 0.85rem 0 0; font-family: Georgia, serif; letter-spacing: 0.2em; text-transform: uppercase; font-size: 9pt; color: #7A776E; }
    .tagline { margin: 1.35rem 0 0; font-family: "Kaiti TC", "KaiTi", serif; font-size: 18pt; letter-spacing: 0.42em; color: #2F3430; }
    .author { margin: 2.4rem 0 0; font-size: 14pt; letter-spacing: 0.22em; color: #B8923A; font-weight: 600; }
    .meta { margin: 0.55rem 0 0; font-size: 10pt; letter-spacing: 0.08em; color: #8A867C; }
    .hint { position: absolute; left: 18mm; bottom: 10mm; font-size: 9pt; color: #8A867C; font-family: system-ui, sans-serif; }
  
  </style>
</head>
<body>

  <div class="page">
    <div class="geo-panel"></div>
    <div class="geo-bar"></div>
    <div class="geo-gold"></div>
    <div class="geo-rule"></div>
    <div class="titles">
      <p class="title">莊子全解</p>
      <p class="subtitle">原典・白話・哲學・人生智慧</p>
      <p class="english">Zhuangzi Atlas</p>
      <p class="tagline">人生玩家</p>
      <p class="author">李孟霖編集</p>
      <p class="meta">版本 0.3.0・2026</p>
    </div>
    <p class="hint">封面｜單獨下載頁</p>
  </div>
</body>
</html>
