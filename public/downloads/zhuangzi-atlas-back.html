<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <title>莊子全解 — 封底</title>
  <style>
    @font-face {
      font-family: "Noto Serif TC";
      src: url("assets/fonts/NotoSerifTC-VF.otf") format("opentype");
      font-weight: 200 900;
      font-style: normal;
      font-display: block;
    }
    @page { size: 148mm 210mm; margin: 0; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 148mm;
      min-height: 210mm;
      background: #F7F5F0;
      color: #1C1C1C;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      font-family: "Noto Serif TC", "Source Han Serif TC", "Songti TC", serif;
    }
    
    .page {
      position: relative;
      width: 148mm; height: 210mm;
      overflow: hidden;
      background: #F7F5F0;
    }
    .geo-panel {
      /* 左側色帶止於正文欄之前，且不延伸到署名區 */
      position: absolute; top: 22%; left: 0; width: 16%; height: 42%;
      background: #6D7F6E; opacity: 0.5;
    }
    .geo-bar {
      position: absolute; right: 0; bottom: 16%; width: 46%; height: 4.5mm;
      background: #2F3430;
    }
    .geo-gold {
      position: absolute; top: 12mm; left: 8mm; width: 7mm; height: 7mm;
      background: #B8923A;
    }
    .inner {
      position: relative; z-index: 2;
      box-sizing: border-box;
      height: 100%;
      /* 正文整欄讓過左側色帶與金塊 */
      padding: 16mm 14mm 18mm 34mm;
      background: transparent;
    }
    .label {
      margin: 0 0 1rem;
      font-size: 9.5pt; letter-spacing: 0.28em;
      color: #8A867C; font-family: system-ui, sans-serif;
    }
    .title {
      margin: 0;
      font-family: "Kaiti TC", "KaiTi", serif;
      font-size: 24pt; letter-spacing: 0.24em;
      color: #B8923A;
    }
    .blurb {
      margin: 1.35rem 0 0;
      font-size: 10.5pt; line-height: 1.95; text-align: justify;
      color: #1C1C1C;
    }
    .quote {
      margin: 1.5rem 0 0;
      font-family: "Kaiti TC", "KaiTi", serif;
      font-size: 12pt; letter-spacing: 0.08em; line-height: 1.8;
      color: #2F3430;
    }
    .footer-block {
      margin-top: 2rem;
      padding: 1rem 1.1rem 1.05rem;
      background: #F7F5F0;
      border: 1px solid rgba(47, 52, 48, 0.1);
      box-shadow: 0 0 0 3mm #F7F5F0; /* 隔開左側色帶，印色不混 */
    }
    .author {
      margin: 0;
      font-size: 12pt; letter-spacing: 0.18em;
      color: #1C1C1C; font-weight: 600;
    }
    .meta {
      margin: 0.55rem 0 0;
      font-size: 9pt; line-height: 1.7;
      color: #4A4A46; font-family: system-ui, sans-serif;
    }
    .isbn {
      margin: 1.1rem 0 0;
      font-size: 10pt; letter-spacing: 0.12em;
      color: #2F3430; font-family: Georgia, serif;
    }
    .hint {
      position: absolute; right: 12mm; bottom: 8mm; z-index: 3;
      font-size: 8.5pt; color: #8A867C; font-family: system-ui, sans-serif;
    }
  
  </style>
</head>
<body>

  <div class="page">
    <div class="geo-panel"></div>
    <div class="geo-bar"></div>
    <div class="geo-gold"></div>
    <div class="inner">
      <p class="label">封底</p>
      <p class="title">莊子全解</p>
      <p class="blurb">
        原典・白話・哲學・人生智慧。本書依《莊子》篇章脈絡展開，清楚區分原典、歷代注家與現代詮釋，
        並連回無待、心齋、無用之用等核心概念，供通讀、劃線與交叉思考。
      </p>
      <p class="quote">人生如逆旅，我亦是行人。</p>
      <div class="footer-block">
        <p class="author">李孟霖編集</p>
        <p class="meta">
          Zhuangzi Atlas　｜　版本 0.3.0・2026<br />
          https://show0621.github.io/zhuangzi-atlas/
        </p>
        <p class="isbn">ISBN　—　—　—　—　—</p>
      </div>
    </div>
    <p class="hint">封底｜單獨下載頁（ISBN 出版時再填）</p>
  </div>
</body>
</html>
